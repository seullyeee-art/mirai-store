<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동전 뒤집기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #1b1c1e;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    font-family: 'Pretendard Variable', -apple-system, sans-serif;
  }

  .scene {
    width: 140px; height: 200px;
    display: flex; align-items: flex-end; justify-content: center;
    position: relative;
  }

  .coin-wrap {
    width: 120px; height: 120px;
    perspective: 600px;
    position: absolute; bottom: 40px;
  }

  .coin {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }

  .face {
    position: absolute; inset: 0;
    border-radius: 50%;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }

  .front {
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.3), transparent 50%),
      linear-gradient(160deg, #2eeaaa, #14c391, #0e9b73);
    box-shadow:
      0 0 0 4px #0e9b73,
      0 0 0 6px rgba(14,155,115,0.4),
      inset 0 2px 6px rgba(255,255,255,0.25),
      inset 0 -3px 6px rgba(0,0,0,0.15);
  }
  .front::before {
    content: ''; position: absolute; inset: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15);
  }
  .front .val { font-size: 38px; font-weight: 900; color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.3); }
  .front .lbl { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 2px; margin-bottom: 2px; }

  .back {
    transform: rotateY(180deg);
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.25), transparent 50%),
      linear-gradient(160deg, #ff8a8a, #ff6363, #e04040);
    box-shadow:
      0 0 0 4px #e04040,
      0 0 0 6px rgba(224,64,64,0.4),
      inset 0 2px 6px rgba(255,255,255,0.2),
      inset 0 -3px 6px rgba(0,0,0,0.15);
  }
  .back::before {
    content: ''; position: absolute; inset: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.12);
  }
  .back .val { font-size: 34px; font-weight: 900; color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.3); }
  .back .lbl { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 2px; margin-bottom: 2px; }

  .shadow {
    width: 90px; height: 12px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.35), transparent 70%);
    border-radius: 50%;
    position: absolute; bottom: 30px;
  }

  .btn {
    padding: 14px 32px; border-radius: 12px; border: none;
    background: rgba(255,255,255,0.08); color: #f7f7f8;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
  }
  .btn:active { transform: scale(0.97); }
  .result {
    font-size: 20px; font-weight: 800; min-height: 28px;
  }
  .result.win { color: #14c391; }
  .result.lose { color: #ff6363; }
</style>
</head>
<body>

<div class="scene">
  <div class="coin-wrap" id="coinWrap">
    <div class="coin" id="coin">
      <div class="face front">
        <span class="lbl">WIN</span>
        <span class="val">×2</span>
      </div>
      <div class="face back">
        <span class="lbl">LOSE</span>
        <span class="val">×0</span>
      </div>
    </div>
  </div>
  <div class="shadow" id="shadow"></div>
</div>

<div class="result" id="result"></div>
<button class="btn" onclick="flipCoin()">동전 뒤집기</button>

<script>
  let busy = false;

  function flipCoin() {
    if (busy) return;
    busy = true;

    const coin = document.getElementById('coin');
    const wrap = document.getElementById('coinWrap');
    const shadow = document.getElementById('shadow');
    const result = document.getElementById('result');
    result.textContent = '';
    result.className = 'result';

    const win = Math.random() < 0.5;
    // 둘 다 정방향으로 착지
    const targetHalf = 0;
    const totalSpins = 8; // 총 회전수
    const totalDeg = totalSpins * 360 + targetHalf;

    // 물리: 위로 던지고 중력으로 내려옴
    const gravity = 0.0025;
    const initVelY = -1.2; // 초기 위로 속도
    const duration = 2000; // ms
    const startTime = performance.now();

    let rotSpeed = totalDeg / duration; // deg per ms

    function animate(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);

      // Y 위치: 포물선 (위로 갔다 내려옴)
      const tNorm = t * 2 - 1; // -1 ~ 1
      const y = -(1 - tNorm * tNorm) * 50; // 포물선, 최대 50px 위로

      // 회전: 처음 빠르게 → 점점 느리게
      const easeOut = 1 - Math.pow(1 - t, 3);
      const rot = easeOut * totalDeg;

      // 살짝 좌우 흔들림
      const wobble = Math.sin(t * Math.PI * 6) * (1 - t) * 8;

      coin.style.transform = `rotateX(${rot}deg) rotateZ(${wobble}deg)`;
      wrap.style.transform = `translateY(${y}px)`;

      // 그림자: 높이에 비례해 작아짐
      const shadowScale = 1 + y / 200;
      const shadowOpacity = 0.35 + y / 500;
      shadow.style.transform = `scale(${Math.max(0.3, shadowScale)})`;
      shadow.style.opacity = Math.max(0.1, shadowOpacity);

      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        // 착지 바운스
        bounce(0, win);
      }
    }

    function bounce(count, win) {
      if (count >= 3) {
        // 완료
        const front = document.querySelector('.front');
        if (win) {
          front.style.background = 'radial-gradient(circle at 35% 30%, rgba(255,255,255,0.3), transparent 50%), linear-gradient(160deg, #2eeaaa, #14c391, #0e9b73)';
          front.querySelector('.val').textContent = '×2';
          front.querySelector('.lbl').textContent = 'WIN';
          result.textContent = '🎉 더블 성공!';
          result.className = 'result win';
          popConfetti();
        } else {
          front.style.background = 'radial-gradient(circle at 35% 30%, rgba(255,255,255,0.25), transparent 50%), linear-gradient(160deg, #ff8a8a, #ff6363, #e04040)';
          front.querySelector('.val').textContent = '×0';
          front.querySelector('.lbl').textContent = '꽝!';
          result.textContent = '😢 미르를 잃었어요';
          result.className = 'result lose';
        }
        busy = false;
        return;
      }

      const height = [6, 3, 1][count];
      const dur = [150, 100, 60][count];
      const start = performance.now();

      function animBounce(now) {
        const t = Math.min((now - start) / dur, 1);
        const y = -Math.sin(t * Math.PI) * height;
        wrap.style.transform = `translateY(${y}px)`;

        const shadowScale = 1 + y / 200;
        shadow.style.transform = `scale(${Math.max(0.3, shadowScale)})`;

        if (t < 1) {
          requestAnimationFrame(animBounce);
        } else {
          bounce(count + 1, win);
        }
      }
      requestAnimationFrame(animBounce);
    }

    requestAnimationFrame(animate);
  }

  function popConfetti() {
    const colors = ['#14c391','#5fffcf','#28d0ed','#ffd700','#ff6b9d','#ffffff'];
    for (let i = 0; i < 50; i++) {
      const c = document.createElement('div');
      const size = Math.random() * 6 + 3;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const angle = Math.random() * Math.PI * 2;
      const vel = Math.random() * 140 + 60;
      const tx = Math.cos(angle) * vel;
      const ty = Math.sin(angle) * vel - 60;
      const rot = Math.random() * 720 - 360;
      const dur = Math.random() * 0.6 + 0.8;
      const round = Math.random() > 0.5;
      c.style.cssText = `
        position:fixed; z-index:9999; pointer-events:none;
        width:${size}px; height:${round ? size : size*2.5}px;
        background:${color}; border-radius:${round ? '50%' : '2px'};
        left:50%; top:40%; opacity:1; transition:none;
      `;
      document.body.appendChild(c);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          c.style.transition = `all ${dur}s cubic-bezier(0.25,0.46,0.45,0.94)`;
          c.style.transform = `translate(${tx}px,${ty}px) rotate(${rot}deg)`;
          c.style.opacity = '0';
        });
      });
      setTimeout(() => c.remove(), dur * 1000 + 200);
    }
  }
</script>
</body>
</html>
