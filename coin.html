<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동전 뒤집기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #1b1c1e;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 32px;
    font-family: -apple-system, sans-serif;
  }

  .coin-container {
    width: 140px; height: 140px;
    perspective: 1000px;
  }

  .coin {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }

  .coin.flipping {
    animation: coinFlip 2s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
  }
  .coin.flipping.lose {
    animation: coinFlipLose 2s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
  }

  .coin-face {
    position: absolute; inset: 0;
    border-radius: 50%;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }

  /* === 앞면 (민트/골드) === */
  .coin-front {
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.25), transparent 50%),
      radial-gradient(circle at 65% 70%, rgba(0,0,0,0.15), transparent 50%),
      linear-gradient(160deg, #2eeaaa, #14c391, #0e9b73, #0a7a5a);
    box-shadow:
      0 6px 24px rgba(0,0,0,0.5),
      0 0 0 4px #0e9b73,
      0 0 0 6px #0a7a5a,
      inset 0 2px 6px rgba(255,255,255,0.25),
      inset 0 -3px 6px rgba(0,0,0,0.2);
  }
  .coin-front::before {
    content: '';
    position: absolute; inset: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
  }
  .coin-front .coin-label {
    font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .coin-front .coin-value {
    font-size: 40px; font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.1);
    line-height: 1;
  }

  /* === 뒷면 (레드) === */
  .coin-back {
    transform: rotateY(180deg);
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.2), transparent 50%),
      radial-gradient(circle at 65% 70%, rgba(0,0,0,0.15), transparent 50%),
      linear-gradient(160deg, #ff8a8a, #ff6363, #e04040, #b83030);
    box-shadow:
      0 6px 24px rgba(0,0,0,0.5),
      0 0 0 4px #e04040,
      0 0 0 6px #b83030,
      inset 0 2px 6px rgba(255,255,255,0.2),
      inset 0 -3px 6px rgba(0,0,0,0.2);
  }
  .coin-back::before {
    content: '';
    position: absolute; inset: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.12);
  }
  .coin-back .coin-label {
    font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    margin-bottom: 2px;
  }
  .coin-back .coin-value {
    font-size: 36px; font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    line-height: 1;
  }

  /* === 동전 두께 (옆면) === */
  .coin-edge {
    position: absolute;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    border-radius: 50%;
  }

  /* === 플립 애니메이션 === */
  @keyframes coinFlip {
    0% { transform: rotateX(0deg) translateY(0) scale(1); }
    10% { transform: rotateX(360deg) translateY(-60px) scale(1.05); }
    25% { transform: rotateX(1080deg) translateY(-140px) scale(1.1); }
    40% { transform: rotateX(1800deg) translateY(-160px) scale(1.1); }
    55% { transform: rotateX(2520deg) translateY(-100px) scale(1.05); }
    70% { transform: rotateX(3060deg) translateY(-40px) scale(1); }
    82% { transform: rotateX(3420deg) translateY(-10px) scale(1); }
    90% { transform: rotateX(3540deg) translateY(-3px) scale(1); }
    100% { transform: rotateX(3600deg) translateY(0) scale(1); }
  }

  @keyframes coinFlipLose {
    0% { transform: rotateX(0deg) translateY(0) scale(1); }
    10% { transform: rotateX(360deg) translateY(-60px) scale(1.05); }
    25% { transform: rotateX(1080deg) translateY(-140px) scale(1.1); }
    40% { transform: rotateX(1800deg) translateY(-160px) scale(1.1); }
    55% { transform: rotateX(2520deg) translateY(-100px) scale(1.05); }
    70% { transform: rotateX(3060deg) translateY(-40px) scale(1); }
    82% { transform: rotateX(3420deg) translateY(-10px) scale(1); }
    90% { transform: rotateX(3540deg) translateY(-3px) scale(1); }
    100% { transform: rotateX(3780deg) translateY(0) scale(1); }
  }

  /* 그림자 애니메이션 */
  .coin-shadow {
    width: 100px; height: 14px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.3), transparent 70%);
    border-radius: 50%;
    margin-top: -8px;
    animation: none;
  }
  .coin-shadow.active {
    animation: shadowPulse 2s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
  }
  @keyframes shadowPulse {
    0% { transform: scale(1); opacity: 0.6; }
    25% { transform: scale(0.5); opacity: 0.2; }
    40% { transform: scale(0.3); opacity: 0.1; }
    70% { transform: scale(0.7); opacity: 0.4; }
    100% { transform: scale(1); opacity: 0.6; }
  }

  .btn {
    padding: 14px 32px; border-radius: 12px; border: none;
    background: rgba(255,255,255,0.08); color: #f7f7f8;
    font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn:active { transform: scale(0.97); background: rgba(255,255,255,0.12); }
  .result {
    font-size: 20px; font-weight: 800; color: #fff;
    min-height: 28px;
  }
  .result.win { color: #14c391; }
  .result.lose { color: #ff6363; }
</style>
</head>
<body>

<div class="coin-container">
  <div class="coin" id="coin">
    <div class="coin-face coin-front">
      <span class="coin-label">WIN</span>
      <span class="coin-value">×2</span>
    </div>
    <div class="coin-face coin-back">
      <span class="coin-label">LOSE</span>
      <span class="coin-value">×0</span>
    </div>
  </div>
</div>
<div class="coin-shadow" id="shadow"></div>

<div class="result" id="result"></div>
<button class="btn" onclick="flipCoin()">동전 뒤집기</button>

<script>
  let flipping = false;
  function flipCoin() {
    if (flipping) return;
    flipping = true;

    const coin = document.getElementById('coin');
    const shadow = document.getElementById('shadow');
    const result = document.getElementById('result');
    const win = Math.random() < 0.5;

    coin.className = 'coin';
    shadow.className = 'coin-shadow';
    result.textContent = '';
    result.className = 'result';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        coin.classList.add('flipping');
        if (!win) coin.classList.add('lose');
        shadow.classList.add('active');

        setTimeout(() => {
          if (win) {
            result.textContent = '🎉 더블 성공! ×2';
            result.className = 'result win';
          } else {
            result.textContent = '😢 꽝! ×0';
            result.className = 'result lose';
          }
          flipping = false;
        }, 2000);
      });
    });
  }
</script>
</body>
</html>
